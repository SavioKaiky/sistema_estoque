{% extends "base.html" %}

{% block content %}

    <h1>Ficha Técnica - {{ produto.nome }}</h1>

    <form method="POST">
        
        <select name="insumo_id">
            {% for i in insumos %}
            <option value="{{ i.id }}">{{ i.nome }}</option>
            {% endfor %}
        </select>

        <input type="number" step="0.01" name="quantidade" placeholder="Quantidade por unidade">

        <button type="submit">Adicionar</button>
    </form>

    <hr>

    <h2>Ingredientes</h2>

    <ul>
        {% for item in ficha %}
            <li>{{ item.insumo.nome }} - {{ item.quantidade }}</li>
        {% endfor %}
    </ul>

{% endblock %}
